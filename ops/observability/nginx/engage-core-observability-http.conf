# Installed into /etc/nginx/conf.d/00-engage-core-observability.conf
# HTTP-context only. Do not include this file inside a server block.

map $uri $engage_safe_path {
    default $uri;

    ~^/j/[^/]+$ "/j/{token}";
    ~^/p/[^/]+$ "/p/{token}";
    ~^/preferences/[^/]+$ "/preferences/{token}";
    ~^/unsubscribe/[^/]+$ "/unsubscribe/{contact}";
    ~^/email-preferences/transactional/opt-out/[^/]+$ "/email-preferences/transactional/opt-out/{contact}";
    ~^/registrations/[^/]+/cancel$ "/registrations/{registration}/cancel";
    ~^/[^/]+/waitlist/[^/]+/register$ "/{seriesSlug}/waitlist/{signup}/register";
}

map $http_referer $engage_referrer_origin {
    default "";
    ~^(?<engage_captured_referrer_origin>https?://[^/?#]+) $engage_captured_referrer_origin;
}

map $http_user_agent $engage_client_class {
    default "unknown";
    "" "missing_user_agent";
    ~*(facebookexternalhit|Twitterbot|LinkedInBot|Slackbot|Discordbot|WhatsApp) "social_link_preview";
    ~*(Googlebot|bingbot|DuckDuckBot|Baiduspider|YandexBot|crawler|spider|slurp) "known_bot";
    ~*(zgrab|CensysInspect|InternetMeasurement|FlowIQLabsBot|masscan|nmap|nikto) "scanner";
    ~*(curl|wget|python-requests|Go-http-client|libwww-perl|okhttp) "automation_client";
    ~*Mozilla/5\.0 "browser_like";
}

log_format engage_core_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"host":"$host",'
        '"server_name":"$server_name",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$engage_safe_path",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_length":$request_length,'
        '"request_time":"$request_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_status":"$upstream_status",'
        '"referrer_origin":"$engage_referrer_origin",'
        '"client_class":"$engage_client_class"'
    '}';
